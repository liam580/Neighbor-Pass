<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neighbor Pass Banner</title>

  <style>
    @font-face {
      font-family: 'PalmCanyonDrive';
      src: url('PalmCanyonDrive-Thin.otf') format('opentype');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    /* No fake card. Optix supplies the outer box. */
    #banner {
      display: none;
      width: 100%;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 8px 10px 6px 10px;
    }

    .wrap {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      grid-template-rows: auto auto;
      column-gap: 12px;
      align-items: center;
      width: 100%;
    }

    .check {
      grid-column: 1;
      grid-row: 1 / span 2;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #0f5a34;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
    }

    .check svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .official {
      grid-column: 2;
      grid-row: 1;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #9a9d97;
      line-height: 1;
      white-space: nowrap;
      margin-bottom: 2px;
    }

    .neighbor {
      grid-column: 2;
      grid-row: 2;
      width: 100%;
      font-family: 'PalmCanyonDrive', cursive;
      font-size: 30px;
      line-height: 1.05;
      color: #143a29;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      padding-bottom: 3px;
    }

    @media (max-width: 430px) {
      .neighbor {
        font-size: 28px;
      }
    }

    @media (max-width: 390px) {
      .neighbor {
        font-size: 26px;
      }

      .official {
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>

  <div id="banner">
    <div class="wrap">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12.5L9.2 16.7L19 7.5" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="official">OFFICIAL</div>
      <div class="neighbor">clubhouse neighbor</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const preview = params.get('preview') === 'true';
    const banner = document.getElementById('banner');

    async function checkForPlan() {
      try {
        const response = await fetch('https://api.optixapp.com/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            query: `
              query {
                me {
                  user {
                    has_plans
                  }
                }
              }
            `
          })
        });

        const data = await response.json();
        const hasPlans = data?.data?.me?.user?.has_plans === true;

        if (hasPlans) {
          banner.style.display = 'block';
        }
      } catch (err) {
        console.error('Error checking plan:', err);
      }
    }

    if (preview) {
      banner.style.display = 'block';
    } else if (token) {
      checkForPlan();
    }
  </script>

</body>
</html>
