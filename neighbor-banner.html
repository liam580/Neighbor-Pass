<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neighbor Pass Banner</title>

  <style>
    @font-face {
      font-family: 'PalmCanyonDrive';
      src: url('PalmCanyonDrive-Thin.otf') format('opentype');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 12px;
      background: transparent;
    }

    #banner {
      display: none;
      width: 100%;
      height: 100%;
    }

    .panel {
      width: 100%;
      height: 100%;
      background: #e6e3d4;
      border-radius: 24px;
      padding: 28px 26px;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      grid-template-rows: auto 1fr;
      column-gap: 18px;
      row-gap: 10px;
      overflow: hidden;
    }

    .check {
      grid-column: 1;
      grid-row: 1 / span 2;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: #0f5a34;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: start;
      margin-top: 4px;
    }

    .check svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .topline {
      grid-column: 2;
      grid-row: 1;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #8f9388;
      line-height: 1;
      white-space: nowrap;
      padding-top: 8px;
    }

    .neighbor {
      grid-column: 2;
      grid-row: 2;
      align-self: start;
      width: 100%;
      font-family: 'PalmCanyonDrive', cursive;
      font-size: 112px;
      line-height: 0.9;
      color: #143a29;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      padding-bottom: 16px;
    }

    @media (max-width: 430px) {
      .panel {
        padding: 24px 20px;
        grid-template-columns: 76px minmax(0, 1fr);
      }

      .check {
        width: 60px;
        height: 60px;
      }

      .check svg {
        width: 26px;
        height: 26px;
      }

      .topline {
        font-size: 12px;
        letter-spacing: 5px;
      }

      .neighbor {
        font-size: 88px;
      }
    }

    @media (max-width: 390px) {
      .neighbor {
        font-size: 78px;
      }

      .topline {
        font-size: 11px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>

  <div id="banner">
    <div class="panel">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 12.5L9.2 16.7L19 7.5" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="topline">OFFICIAL CLUBHOUSE</div>
      <div class="neighbor">neighbor</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const preview = params.get('preview') === 'true';
    const banner = document.getElementById('banner');

    async function checkForPlan() {
      try {
        const response = await fetch('https://api.optixapp.com/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            query: `
              query {
                me {
                  user {
                    has_plans
                  }
                }
              }
            `
          })
        });

        const data = await response.json();
        const hasPlans = data?.data?.me?.user?.has_plans === true;

        if (hasPlans) {
          banner.style.display = 'block';
        }
      } catch (err) {
        console.error('Error checking plan:', err);
      }
    }

    if (preview) {
      banner.style.display = 'block';
    } else if (token) {
      checkForPlan();
    }
  </script>

</body>
</html>
