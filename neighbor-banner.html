<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neighbor Pass Banner</title>
  <style>
    @font-face {
      font-family: 'PalmCanyonDrive';
      src: url('PalmCanyonDrive-Thin.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }

    #banner {
      display: none;
      background-color: #f5f0e8;
      border-radius: 14px;
      margin: 12px;
      padding: 16px 20px;
      display: none;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid #e0d8cc;
    }

    .check {
      width: 36px;
      height: 36px;
      background-color: #1a3a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .check svg {
      width: 18px;
      height: 18px;
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .script-text {
      font-family: 'PalmCanyonDrive', cursive;
      font-size: 32px;
      color: #1a3a2a;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .sub-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #1a3a2a;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div id="banner">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="text-block">
      <div class="script-text">clubhouse</div>
      <div class="sub-text">Official Neighbor ✦</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const banner = document.getElementById('banner');

    if (!token) {
      // No token, stay hidden
    } else {
      async function checkForNeighborPass() {
        try {
          const response = await fetch('https://api.optixapp.com/graphql', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
              query: `
                query {
                  me {
                    memberships {
                      plan {
                        name
                      }
                    }
                  }
                }
              `
            })
          });

          const data = await response.json();
          const memberships = data?.data?.me?.memberships || [];
          const hasNeighborPass = memberships.some(m =>
            m?.plan?.name?.toLowerCase().includes('neighbor pass')
          );

          if (hasNeighborPass) {
            banner.style.display = 'flex';
          }

        } catch (err) {
          console.error('Error checking membership:', err);
        }
      }

      checkForNeighborPass();
    }
  </script>

</body>
</html>
