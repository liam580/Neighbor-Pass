<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neighbor Pass Banner</title>
  <style>
    @font-face {
      font-family: 'PalmCanyonDrive';
      src: url('PalmCanyonDrive-Thin.otf') format('opentype');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: transparent; }

    #banner {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      height: 100%;
    }

    .check {
      width: 44px;
      height: 44px;
      background-color: #1a3a2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .check svg { width: 22px; height: 22px; }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 0px;
    }

    .label {
      font-family: -apple-system, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #1a3a2a;
      opacity: 0.5;
    }

    .script-text {
      font-family: 'PalmCanyonDrive', cursive;
      font-size: 36px;
      color: #1a3a2a;
      line-height: 1;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="banner">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="text-block">
      <div class="label">Official</div>
      <div class="script-text">Neighbor</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const banner = document.getElementById('banner');

    if (!token) {
      banner.style.display = 'flex';
    } else {
      async function checkForNeighborPass() {
        try {
          const response = await fetch('https://api.optixapp.com/graphql', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
              query: `query { accountPlans { data { name status } } }`
            })
          });
          const data = await response.json();
          const plans = data?.data?.accountPlans?.data || [];
          const hasNeighborPass = plans.some(p =>
            p?.name?.toLowerCase().includes('neighbor pass') && p?.status === 'ACTIVE'
          );
          if (hasNeighborPass) {
            banner.style.display = 'flex';
          }
        } catch (err) {
          console.error('Error:', err);
        }
      }
      checkForNeighborPass();
    }
  </script>
</body>
</html>
