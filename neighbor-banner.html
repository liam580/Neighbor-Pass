<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neighbor Pass Banner</title>

  <style>
    @font-face {
      font-family: 'PalmCanyonDrive';
      src: url('PalmCanyonDrive-Thin.otf') format('opentype');
      font-display: swap;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 0;
    }

    #banner {
      display: none;
      width: 100%;
      min-height: 84px;
      padding: 14px 16px;
      background: #ffffff;
      border: 1px solid #dedede;
      border-radius: 12px;
      align-items: center;
      gap: 14px;
    }

    .check {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 999px;
      background: #0f4b2f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .check svg {
      width: 20px;
      height: 20px;
    }

    .text-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1;
    }

    .official {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #8f9491;
      margin-bottom: 2px;
    }

    .neighbor {
      width: 100%;
      font-family: 'PalmCanyonDrive', cursive;
      font-size: 54px;
      line-height: 0.8;
      color: #173d2b;
      white-space: nowrap;
      transform: translateY(2px);
    }

    /* Slightly smaller on narrow phones */
    @media (max-width: 390px) {
      .neighbor {
        font-size: 48px;
      }

      .official {
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>

  <div id="banner">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 12.5L9.2 16.7L19 7.5" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="text-wrap">
      <div class="official">OFFICIAL</div>
      <div class="neighbor">Neighbor</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const preview = params.get('preview') === 'true';
    const banner = document.getElementById('banner');

    async function checkForNeighborPass() {
      try {
        const response = await fetch('https://api.optixapp.com/graphql', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            query: `
              query {
                me {
                  user {
                    has_plans
                  }
                }
              }
            `
          })
        });

        const data = await response.json();
        const hasPlans = data?.data?.me?.user?.has_plans === true;

        if (hasPlans) {
          banner.style.display = 'flex';
        }
      } catch (err) {
        console.error('Error checking plan:', err);
      }
    }

    if (preview) {
      banner.style.display = 'flex';
    } else if (token) {
      checkForNeighborPass();
    }
  </script>

</body>
</html>
